services:
  - type: web
    name: source-code-analysis-genai
    env: python
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt ; python manage.py collectstatic --noinput
    startCommand: gunicorn --bind 0.0.0.0:$PORT codesphere.wsgi:application --log-file - --timeout 300 --graceful-timeout 60
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
